name: flutter_reading_portfolio_app
description: A portfolio-ready Flutter app for reading progress, habits, quizzes, and PDF study.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  epub_view: ^3.2.0
  file_picker: 11.0.2
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.1
  syncfusion_flutter_pdfviewer: ^33.2.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
